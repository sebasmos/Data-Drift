<svg width="100%" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg" style="background: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<style>
  .t1 { font-size: 10px; font-weight: 600; fill: #1a1a1a; }
  .t2 { font-size: 8px; font-weight: 400; fill: #555; }
  .t3 { font-size: 7.5px; font-weight: 400; fill: #888; }
  .nb { font-size: 9px; font-weight: 600; fill: #1a1a1a; }
  .tag { font-size: 6.5px; font-weight: 600; fill: white; letter-spacing: 0.4px; }
  .arr { stroke: #aaa; stroke-width: 0.8; }
</style>

<!-- LEFT: Four ICU Databases box -->
<rect x="10" y="100" width="100" height="50" rx="5" fill="#F5F5F2" stroke="#BBB" stroke-width="0.7"/>
<text class="t1" x="60" y="120" text-anchor="middle">Four ICU</text>
<text class="t1" x="60" y="132" text-anchor="middle">Databases</text>
<text class="t2" x="60" y="144" text-anchor="middle">2001–2022</text>

<!-- Arrow right -->
<line x1="110" y1="125" x2="128" y2="125" class="arr" marker-end="url(#arrow)"/>

<!-- INCLUSION -->
<rect x="132" y="100" width="120" height="50" rx="5" fill="#EDF4ED" stroke="#5B8C5A" stroke-width="0.6"/>
<text class="t1" x="192" y="116" text-anchor="middle" fill="#3A6B39">Inclusion</text>
<text class="t2" x="192" y="128" text-anchor="middle" fill="#3A6B39">Age ≥ 16</text>
<text class="t2" x="192" y="138" text-anchor="middle" fill="#3A6B39">1st ICU stay ≥ 4 h</text>
<text class="t2" x="192" y="148" text-anchor="middle" fill="#3A6B39">Non-missing outcome</text>

<!-- Arrow right -->
<line x1="252" y1="125" x2="270" y2="125" class="arr" marker-end="url(#arrow)"/>

<!-- TOTAL COHORT -->
<rect x="274" y="106" width="100" height="38" rx="5" fill="#E8E6F8" stroke="#534AB7" stroke-width="0.8"/>
<text class="nb" x="324" y="122" text-anchor="middle" fill="#3C3489">809,017</text>
<text class="t2" x="324" y="134" text-anchor="middle" fill="#534AB7">ICU admissions</text>

<!-- Arrow right, then split into 4 vertically -->
<line x1="374" y1="125" x2="400" y2="125" class="arr"/>
<!-- Vertical line -->
<line x1="400" y1="42" x2="400" y2="268" class="arr"/>
<!-- Horizontal branches -->
<line x1="400" y1="42" x2="416" y2="42" class="arr" marker-end="url(#arrow)"/>
<line x1="400" y1="117" x2="416" y2="117" class="arr" marker-end="url(#arrow)"/>
<line x1="400" y1="192" x2="416" y2="192" class="arr" marker-end="url(#arrow)"/>
<line x1="400" y1="268" x2="416" y2="268" class="arr" marker-end="url(#arrow)"/>

<!-- MIMIC -->
<rect x="420" y="10" width="200" height="64" rx="4" fill="#FAFAFA" stroke="#2D6A9F" stroke-width="0.8"/>
<rect x="423" y="13" width="50" height="10" rx="2" fill="#2D6A9F"/>
<text class="tag" x="448" y="21" text-anchor="middle">N. AMERICA</text>
<text class="t1" x="520" y="26" text-anchor="middle" font-size="9.5">MIMIC Combined</text>
<text class="t2" x="520" y="37" text-anchor="middle">Boston, US · Single center</text>
<text class="nb" x="520" y="49" text-anchor="middle">112,468 · 11.1% mort.</text>
<text class="t3" x="520" y="60" text-anchor="middle">2001–2022 · Race: Yes · SOFA + 3 scores · 6 periods</text>

<!-- eICU -->
<rect x="420" y="85" width="200" height="64" rx="4" fill="#FAFAFA" stroke="#2D6A9F" stroke-width="0.8"/>
<rect x="423" y="88" width="50" height="10" rx="2" fill="#2D6A9F"/>
<text class="tag" x="448" y="96" text-anchor="middle">N. AMERICA</text>
<text class="t1" x="520" y="101" text-anchor="middle" font-size="9.5">eICU Combined</text>
<text class="t2" x="520" y="112" text-anchor="middle">Multi-center US · 4 regions</text>
<text class="nb" x="520" y="124" text-anchor="middle">661,358 · 10.9% mort.</text>
<text class="t3" x="520" y="135" text-anchor="middle">2014–2021 · Race: Yes · SOFA + 4 scores · 4 periods</text>

<!-- Amsterdam -->
<rect x="420" y="160" width="200" height="64" rx="4" fill="#FAFAFA" stroke="#2E7D56" stroke-width="0.8"/>
<rect x="423" y="163" width="38" height="10" rx="2" fill="#2E7D56"/>
<text class="tag" x="442" y="171" text-anchor="middle">EUROPE</text>
<text class="t1" x="520" y="176" text-anchor="middle" font-size="9.5">AmsterdamUMCdb</text>
<text class="t2" x="520" y="187" text-anchor="middle">Amsterdam, NL</text>
<text class="nb" x="520" y="199" text-anchor="middle">27,259 · 7.9% mort.</text>
<text class="t3" x="520" y="210" text-anchor="middle">2013–2021 · Race: No · SOFA + 3 scores · 9 periods</text>

<!-- Zhejiang -->
<rect x="420" y="236" width="200" height="64" rx="4" fill="#FAFAFA" stroke="#B8860B" stroke-width="0.8"/>
<rect x="423" y="239" width="26" height="10" rx="2" fill="#B8860B"/>
<text class="tag" x="436" y="247" text-anchor="middle">ASIA</text>
<text class="t1" x="520" y="252" text-anchor="middle" font-size="9.5">Zhejiang</text>
<text class="t2" x="520" y="263" text-anchor="middle">Zhejiang, China</text>
<text class="nb" x="520" y="275" text-anchor="middle">7,932 · 14.7% mort.</text>
<text class="t3" x="520" y="286" text-anchor="middle">2011–2022 · Race: No · SOFA + 3 scores · 4 periods</text>

<!-- Right side: converge arrows -->
<line x1="620" y1="42" x2="640" y2="42" class="arr"/>
<line x1="620" y1="117" x2="640" y2="117" class="arr"/>
<line x1="620" y1="192" x2="640" y2="192" class="arr"/>
<line x1="620" y1="268" x2="640" y2="268" class="arr"/>
<line x1="640" y1="42" x2="640" y2="268" class="arr"/>
<line x1="640" y1="155" x2="656" y2="155" class="arr" marker-end="url(#arrow)"/>

<!-- STRATIFICATION + ANALYSIS stacked -->
<rect x="660" y="100" width="115" height="28" rx="3" fill="#FFF8ED" stroke="#C4940A" stroke-width="0.6"/>
<text class="t2" x="717" y="112" text-anchor="middle" fill="#8B6914">Age × Gender × Race</text>
<text class="t3" x="717" y="122" text-anchor="middle" fill="#8B6914">n ≥ 30 per subgroup</text>

<line x1="717" y1="128" x2="717" y2="140" class="arr" marker-end="url(#arrow)"/>

<rect x="660" y="144" width="115" height="28" rx="3" fill="#F0EDFA" stroke="#534AB7" stroke-width="0.6"/>
<text class="t2" x="717" y="156" text-anchor="middle" fill="#534AB7">SOFA AUROC × time</text>
<text class="t3" x="717" y="166" text-anchor="middle" fill="#534AB7">Bootstrap CIs · Pooled FDR</text>

<line x1="717" y1="172" x2="717" y2="184" class="arr" marker-end="url(#arrow)"/>

<rect x="640" y="188" width="155" height="30" rx="3" fill="#FDE8E8" stroke="#C0392B" stroke-width="0.6"/>
<text class="t3" x="717" y="201" text-anchor="middle" fill="#922B21" font-weight="500">Uniform recalibration masks</text>
<text class="t3" x="717" y="212" text-anchor="middle" fill="#922B21" font-weight="500">divergent subgroup drift</text>

</svg>